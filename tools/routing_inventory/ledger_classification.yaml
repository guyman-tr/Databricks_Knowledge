      Payment-processor MIDs are payment-flow-only.
    entries:
      - concept: apex
        primary_owner: domain-cross
        pattern: primary_only
        drop_from: [domain-options, domain-payments, domain-revenue-and-fees]
        notes: "Apex = US broker. Canonical recon in domain-cross. Trading-via-Apex stays in domain-options via 'apex options' qualified form."
