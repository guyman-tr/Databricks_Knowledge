# Routing Disambiguation - Ownership Ledger (Phase 2 draft)
#
# One entry per TRIGGER-OVERLAP concept (184 total). Organized by super-concept.
#
# Fields:
#   concept             - normalized trigger string (matches concepts.csv lower-case form)
#   primary_owner       - hub that wins routing for the bare form
#   pattern             - primary_only | qualified_wins | context_dispatch
#   drop_from           - list of hubs that must DROP the bare trigger (Phase 4 edit)
#   notes               - optional rationale / Phase 3 contract anchor
#
# Patterns:
#   primary_only       - bare form belongs to ONE hub; secondaries drop the trigger entirely
#   qualified_wins     - bare form goes to primary; secondaries keep ONLY qualified forms
#                        (e.g., "spaceship X", "options X"). Secondaries DROP the bare form.
#   context_dispatch   - bare form has multiple legitimate owners; the contract codifies
#                        when each wins (intent-based). NO drop_from; contract handles routing.
#
# Validator: build_ledger.py confirms every trigger-overlap concept in
# concepts.csv has exactly one entry below.

super_concepts:

