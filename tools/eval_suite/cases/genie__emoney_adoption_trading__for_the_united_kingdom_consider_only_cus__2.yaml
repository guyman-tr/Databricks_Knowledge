id: genie__emoney_adoption_trading__for_the_united_kingdom_consider_only_cus__2
question: For the United Kingdom, consider only customers whose club is NOT Bronze.
source: genie_benchmark:01f0c51e5a4a1506bb34d4751918b4d2
asof: '2026-06-08'
ground_truth_sql: WITH active_tp_mimo AS ( SELECT `CID` FROM `main`.`bi_output`.`vg_acquisitionfunnel_em1`
  WHERE `Country` = 'United Kingdom' AND `Club` != 'Bronze' AND `IsActiveMIMO` = 1
  ), emoney AS ( SELECT `CID` FROM active_tp_mimo WHERE `CID` IN (SELECT `CID` FROM
  `main`.`bi_output`.`vg_acquisitionfunnel_em1` WHERE `IseMoneyAccount` = 1) ), fmi
  AS ( SELECT `CID` FROM emoney WHERE `CID` IN (SELECT `CID` FROM `main`.`bi_output`.`vg_acquisitionfunnel_em1`
  WHERE `IsFMI` = 1) ) SELECT (SELECT COUNT(*) FROM active_tp_mimo) AS active_tp_mimo_customers,
  (SELECT COUNT(*) FROM emoney) AS emoney_customers, try_divide(100.0 * (SELECT COUNT(*)
  FROM emoney),NULLIF((SELECT COUNT(*) FROM active_tp_mimo),0)) AS emoney_pct_of_prev,
  (SELECT COUNT(*) FROM fmi) AS fmi_customers, try_divide(100.0 * (SELECT COUNT(*)
  FROM fmi),NULLIF((SELECT COUNT(*) FROM emoney),0)) AS fmi_pct_of_prev
expected_value:
