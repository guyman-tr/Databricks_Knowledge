id: genie__ops_documents_verification__how_many_poi_and_poa_documents_were_uplo__2
question: How many POI and POA documents were uploaded by EV Verified clients in the
  last 30 days?
source: genie_benchmark:01f0f77496571e68a9f115149bcc48d9
asof: '2026-06-08'
ground_truth_sql: "SELECT\n  suggested_document_type,\n  COUNT(*) as document_count,\n\
  \  COUNT(DISTINCT cid) as unique_clients\nFROM\n  main.bi_output_stg.bi_output_operations_documentanalysis\n\
  WHERE\n  client_category = 'EVVerifiedUpload'\n  AND suggested_document_type IN\
  \ ('Proof of Identity', 'Proof of address')\n  AND upload_date >= CURRENT_DATE -\
  \ INTERVAL 30 DAYS\nGROUP BY\n  suggested_document_type\nORDER BY\n  document_count\
  \ DESC"
expected_value:
  type: tabular
  value:
  - - Proof of Identity
    - 16366
    - 7892
  - - Proof of address
    - 3799
    - 2475
  columns:
  - suggested_document_type
  - document_count
  - unique_clients
  tolerance_pct: 0.5
expected_skill_hub: domain-ops-and-onboarding
skill_coverage_status: covered
