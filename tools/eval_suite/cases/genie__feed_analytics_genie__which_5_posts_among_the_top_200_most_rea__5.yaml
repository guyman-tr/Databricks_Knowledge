id: genie__feed_analytics_genie__which_5_posts_among_the_top_200_most_rea__5
question: Which 5 posts among the top 200 most read posts in the last week had the
  highest conversion rate to trades, including their post owner names?
source: genie_benchmark:01f105b421e7187baa5e81595599f7f3
asof: '2026-06-08'
ground_truth_sql: "WITH top_posts AS (\n  SELECT\n    post_id_1_2,\n    post_owner,\n\
  \    COUNT(DISTINCT mp_user_id) AS users_read\n  FROM\n    `main`.`mixpanel`.`silver`\n\
  \  WHERE\n    mp_event_name = 'Feed - Post Read'\n    AND etr_ymd >= CAST(date_add(CURRENT_DATE,\
  \ -7) AS STRING)\n    AND etr_ymd <= CAST(CURRENT_DATE AS STRING)\n    AND post_id_1_2\
  \ IS NOT NULL\n    AND post_owner IS NOT NULL\n  GROUP BY\n    post_id_1_2,\n  \
  \  post_owner\n  ORDER BY\n    users_read DESC\n  LIMIT 200\n),\nreads AS (\n  SELECT\n\
  \    post_id_1_2,\n    post_owner,\n    mp_user_id\n  FROM\n    `main`.`mixpanel`.`silver`\n\
  \  WHERE\n    mp_event_name = 'Feed - Post Read'\n    AND etr_ymd >= CAST(date_add(CURRENT_DATE,\
  \ -7) AS STRING)\n    AND etr_ymd <= CAST(CURRENT_DATE AS STRING)\n    AND post_id_1_2\
  \ IS NOT NULL\n    AND post_owner IS NOT NULL\n),\ntrades AS (\n  SELECT\n    mp_user_id\n\
  \  FROM\n    `main`.`mixpanel`.`silver`\n  WHERE\n    mp_event_name = 'Open Order\
  \ - Success'\n    AND etr_ymd >= CAST(date_add(CURRENT_DATE, -7) AS STRING)\n  \
  \  AND etr_ymd <= CAST(CURRENT_DATE AS STRING)\n    AND category_1 = 'Success'\n\
  \    AND portfolio = 'Real'\n    AND mp_user_id IS NOT NULL\n)\nSELECT\n  t.post_id_1_2,\n\
  \  t.post_owner,\n  t.users_read,\n  COUNT(DISTINCT r.mp_user_id) AS users_traded,\n\
  \  (try_divide(COUNT(DISTINCT r.mp_user_id) * 1.0, t.users_read)) AS conversion_rate\n\
  FROM\n  top_posts t\n    JOIN reads r\n      ON t.post_id_1_2 = r.post_id_1_2\n\
  \      AND t.post_owner = r.post_owner\nWHERE\n  EXISTS (\n    SELECT\n      1\n\
  \    FROM\n      trades tr\n    WHERE\n      tr.mp_user_id = r.mp_user_id\n  )\n\
  GROUP BY\n  t.post_id_1_2,\n  t.post_owner,\n  t.users_read\nORDER BY\n  conversion_rate\
  \ DESC,\n  t.users_read DESC\nLIMIT 5"
