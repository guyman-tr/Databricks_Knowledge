id: genie__feed_analytics_genie__what_are_the_most_frequently_tagged_asse__3
question: What are the most frequently tagged assets in the feed for created posts?
source: genie_benchmark:01f105b421e7187baa5e81595599f7f3
asof: '2026-06-08'
ground_truth_sql: "WITH exploded_tags AS (\n  SELECT\n    EventPayloadRowData_Entity_Id\
  \ AS post_id,\n    tag.Market.SymbolName AS symbol,\n    tag.Market.Id AS asset_id,\n\
  \    tag.Market.DisplayName AS display_name,\n    tag.Market.AssetType AS asset_type\n\
  \  FROM\n    `main`.`experience`.`bronze_event_hub_prod_event_streaming_we_streams_post`\n\
  \    LATERAL VIEW explode(EventPayloadRowData_Entity_Tags) AS tag\n  WHERE\n   \
  \ EventPayloadRowData_OperationType = 'Create'\n)\nSELECT\n  symbol,\n  asset_id,\n\
  \  display_name,\n  asset_type,\n  COUNT(*) AS tag_count,\n  COUNT(DISTINCT post_id)\
  \ AS unique_posts\nFROM\n  exploded_tags\nWHERE\n  symbol IS NOT NULL\nGROUP BY\n\
  \  symbol,\n  asset_id,\n  display_name,\n  asset_type\nORDER BY\n  tag_count DESC\n\
  LIMIT 50"
