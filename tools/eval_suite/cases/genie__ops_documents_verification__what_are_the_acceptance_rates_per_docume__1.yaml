id: genie__ops_documents_verification__what_are_the_acceptance_rates_per_docume__1
question: What are the acceptance rates per document type from clients in the United
  Kingdom between 01-01-2026 and 15-01-2026?
source: genie_benchmark:01f0f77496571e68a9f115149bcc48d9
asof: '2026-06-08'
ground_truth_sql: "SELECT\n  suggested_document_type,\n  COUNT(*) AS total_documents,\n\
  \  SUM(\n    CASE\n      WHEN is_rejected = 0 THEN 1\n      ELSE 0\n    END\n  )\
  \ AS accepted_documents,\n  try_divide(\n    1.0\n    * SUM(\n      CASE\n     \
  \   WHEN is_rejected = 0 THEN 1\n        ELSE 0\n      END\n    ),\n    COUNT(*)\n\
  \  ) AS acceptance_rate\nFROM\n  main.bi_output_stg.bi_output_operations_documentanalysis\n\
  WHERE\n  country = 'United Kingdom'\n  AND upload_date >= '2026-01-01'\n  AND upload_date\
  \ < '2026-01-16'\n  AND suggested_document_type IS NOT NULL\nGROUP BY\n  suggested_document_type\n\
  ORDER BY\n  acceptance_rate DESC"
