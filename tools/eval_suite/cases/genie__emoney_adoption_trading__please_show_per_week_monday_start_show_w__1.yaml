id: genie__emoney_adoption_trading__please_show_per_week_monday_start_show_w__1
question: 'Please show, per week (Monday start, show week start date):'
source: genie_benchmark:01f0c51e5a4a1506bb34d4751918b4d2
asof: '2026-06-08'
ground_truth_sql: WITH fmi_fr_customers AS ( SELECT fmi.CID, date_trunc('WEEK', fmi.emoney_fmi_date)
  AS cohort_week, fmi.emoney_fmi_date FROM main.bi_output.vg_emoney_panel_firstdates_em1
  AS fmi INNER JOIN main.bi_output.vg_fact_snapshotcustomer_for_emoney_genie AS snap
  ON fmi.CID = snap.CID AND CAST(date_format(fmi.emoney_fmi_date, 'yyyyMMdd') AS INT)
  BETWEEN snap.FromDateID AND snap.ToDateID WHERE snap.Country_FromDate_ToDate = 'France'
  AND fmi.emoney_fmi_date >= '2025-08-04' AND fmi.emoney_fmi_date IS NOT NULL ), open_positions_7d_after_fmi
  AS ( SELECT fmi.CID, fmi.cohort_week, SUM(COALESCE(lc4.num_positions_total,0)) AS
  open_positions_7d FROM fmi_fr_customers AS fmi LEFT JOIN main.bi_output.vg_positionsvolumeandattributes_lc4_source
  AS lc4 ON fmi.CID = lc4.CID AND lc4.position_event_date BETWEEN CAST(fmi.emoney_fmi_date
  AS DATE) AND date_add(CAST(fmi.emoney_fmi_date AS DATE), 6) AND lc4.position_event_flag
  = 'OpenDataFlag' GROUP BY fmi.CID, fmi.cohort_week ) SELECT cohort_week, COUNT(DISTINCT
  CID) AS num_new_fmi_customers, SUM(open_positions_7d) AS total_open_positions_7d_after_fmi,
  TRY_DIVIDE(SUM(open_positions_7d), COUNT(DISTINCT CID)) AS avg_open_positions_per_fmi_customer_7d
  FROM open_positions_7d_after_fmi GROUP BY cohort_week ORDER BY cohort_week ASC
