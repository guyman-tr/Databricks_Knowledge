id: genie__prod_compliance_genie__please_give_me_the_number_of_client_that__7
question: please give me the number of client that are allowed for CFD but didn't
  trade CFD
source: genie_benchmark:01f137f76a75126fb15b03341732911f
asof: '2026-06-08'
ground_truth_sql: "WITH cfd_allowed_clients AS (\n  SELECT DISTINCT `RealCID`\n  FROM\
  \ `main`.`etoro_kpi`.`cfd_statusinfo_v`\n  WHERE `CFD_Status` = 'CFD_Allowed'\n\
  ),\nclients_with_cfd_trades AS (\n  SELECT DISTINCT `cid` AS RealCID\n  FROM `main`.`etoro_kpi`.`positions_for_compliance_v`\n\
  \  WHERE `issettled` = 0\n)\nSELECT COUNT(*) AS num_clients_allowed_no_cfd_trade\n\
  FROM cfd_allowed_clients cac\nLEFT JOIN clients_with_cfd_trades cwt ON cac.RealCID\
  \ = cwt.RealCID\nWHERE cwt.RealCID IS NULL"
expected_value:
  type: numeric
  value: 11226822
  tolerance_pct: 0.5
expected_skill_hub: domain-customer-and-identity
skill_coverage_status: covered
canonical_tables:
- main.etoro_kpi.cfd_statusinfo_v
- main.etoro_kpi.positions_for_compliance_v
