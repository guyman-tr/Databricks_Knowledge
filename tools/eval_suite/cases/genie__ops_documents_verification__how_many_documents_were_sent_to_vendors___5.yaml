id: genie__ops_documents_verification__how_many_documents_were_sent_to_vendors___5
question: How many documents were sent to vendors vs not sent in the last 30 days?
source: genie_benchmark:01f0f77496571e68a9f115149bcc48d9
asof: '2026-06-08'
ground_truth_sql: "SELECT\n  CASE\n    WHEN vendor IS NOT NULL THEN 'Sent to Vendor'\n\
  \    ELSE 'Not Sent to Vendor'\n  END as vendor_routing,\n  COUNT(*) as document_count,\n\
  \  ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER (), 2) as percentage\nFROM\n  main.bi_output_stg.bi_output_operations_documentanalysis\n\
  WHERE\n  upload_date >= CURRENT_DATE - INTERVAL 30 DAY\nGROUP BY\n  vendor_routing\n\
  ORDER BY\n  document_count DESC"
expected_value:
  type: tabular
  value:
  - - Sent to Vendor
    - 171835
    - 50.61
  - - Not Sent to Vendor
    - 167704
    - 49.39
  columns:
  - vendor_routing
  - document_count
  - percentage
  tolerance_pct: 0.5
