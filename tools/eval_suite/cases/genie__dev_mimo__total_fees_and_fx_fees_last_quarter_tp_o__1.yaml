id: genie__dev_mimo__total_fees_and_fx_fees_last_quarter_tp_o__1
question: Total fees and FX fees, last quarter (TP only — eMoney fees are separate
  rows)
source: genie_benchmark:01f15e792ce1140bbf6af2f8f7c6b54c
asof: '2026-06-08'
ground_truth_sql: "WITH mimo AS (\n    SELECT FeeUSD, FXFeeAmount, TransactionDate\n\
  \    FROM main.etoro_kpi.mimo_tp_deposits_v\n    UNION ALL\n    SELECT FeeUSD, FXFeeAmount,\
  \ TransactionDate\n    FROM main.etoro_kpi.mimo_tp_withdraws_v\n)\nSELECT\n    SUM(FeeUSD)\
  \      AS total_fees_usd,\n    SUM(FXFeeAmount) AS total_fx_fees\nFROM mimo\nWHERE\
  \ TransactionDate >= ADD_MONTHS(DATE_TRUNC('QUARTER', CURRENT_DATE()), -3)\n  AND\
  \ TransactionDate <  DATE_TRUNC('QUARTER', CURRENT_DATE());"
