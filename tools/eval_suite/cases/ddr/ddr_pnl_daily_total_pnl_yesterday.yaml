asof: '2026-06-08'

natural_language_question: |
 What was the total Daily PnL (realized NetProfit + unrealized mark-to-market change) across all positions on 2026-06-08?

# ----- Ground truth (Synapse PROD, faithful TVF) -----
ground_truth:
  source_db: synapse_prod
  routine: BI_DB_dbo.Function_DDR_Aggregation_Yesterday
  sql: |
    SELECT SUM(DailyTotalPnL) AS value
    FROM BI_DB_dbo.Function_DDR_Aggregation_Yesterday('20260608', 0)
    WHERE IsCreditReportValidCB = 1
  value: 104757898.38
  pinned_at: '2026-06-11T06:59:42Z'

# ----- UC equivalent (canonical valid-users-filter Pattern 2) -----
uc_equivalent:
  status: live
  sql: |
    -- fact_pnl is long-form: (DateID, RealCID, InstrumentTypeID, IsSettled, IsCopy).
    -- DailyTotalPnL on the canvas = NetProfit + UnrealizedPnLChange across all rows.
    SELECT SUM(d.NetProfit + d.UnrealizedPnLChange) AS DailyTotalPnL
    FROM main.bi_db.gold_sql_dp_prod_we_bi_db_dbo_bi_db_ddr_fact_pnl d
    JOIN main.dwh.gold_sql_dp_prod_we_dwh_dbo_v_fact_snapshotcustomer_fromdateid_masked snap
        ON snap.RealCID = d.RealCID
       AND snap.IsCreditReportValidCB = 1
       AND d.DateID BETWEEN snap.FromDateID AND snap.ToDateID
    WHERE d.DateID = 20260608
  value: 104757898.38
  pinned_at: '2026-06-11T06:59:42Z'

