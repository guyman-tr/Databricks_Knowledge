id: genie__ops_documents_verification__what_percentage_of_documents_were_proces__6
question: What percentage of documents were processed automatically vs manually?
source: genie_benchmark:01f0f77496571e68a9f115149bcc48d9
asof: '2026-06-08'
ground_truth_sql: "SELECT\n  CASE\n    WHEN managerid = 0 THEN 'Automatic'\n    WHEN\
  \ managerid != 0 THEN 'Manual'\n    ELSE 'Unknown'\n  END AS processing_mode,\n\
  \  COUNT(*) AS document_count,\n  ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER (),\
  \ 2) AS percentage\nFROM\n  main.bi_output_stg.bi_output_operations_documentanalysis\n\
  WHERE\n  managerid IS NOT NULL\nGROUP BY\n  processing_mode\nORDER BY\n  document_count\
  \ DESC"
expected_value:
  type: tabular
  value:
