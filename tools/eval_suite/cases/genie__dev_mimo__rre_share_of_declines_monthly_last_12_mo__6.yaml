id: genie__dev_mimo__rre_share_of_declines_monthly_last_12_mo__6
question: RRE share of declines, monthly, last 12 months
source: genie_benchmark:01f15e792ce1140bbf6af2f8f7c6b54c
asof: '2026-06-08'
ground_truth_sql: "SELECT\n    DATE_TRUNC('MONTH', TransactionDate)              \
  \                                                AS txn_month,\n    SUM(CASE WHEN\
  \ PaymentStatus = 'DeclineByRRE' THEN 1.0 END)\n      / NULLIF(SUM(CASE WHEN PaymentStatus\
  \ IN ('Decline','Failed','Rejected','DeclineByRRE') THEN 1.0 END), 0) AS rre_share_of_declines\n\
  FROM main.etoro_kpi.mimo_tp_deposits_v\nWHERE TransactionDate >= ADD_MONTHS(CURRENT_DATE(),\
  \ -12)\nGROUP BY 1\nORDER BY 1;"
