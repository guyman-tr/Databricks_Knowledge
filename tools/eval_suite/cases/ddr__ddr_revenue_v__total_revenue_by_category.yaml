id: ddr__ddr_revenue_v__total_revenue_by_category
question: Break down eToro's total revenue on 2026-06-08 by RevenueMetricCategory.
source: ddr
asof: '2026-06-08'
ground_truth_sql: "SELECT RevenueMetricCategory, SUM(RevenueAmount) AS revenue\nFROM\
  \ main.etoro_kpi.ddr_revenue_v\nWHERE Date = DATE'2026-06-08'\n  AND IncludedInTotalRevenue\
  \ = 1\nGROUP BY RevenueMetricCategory ORDER BY revenue DESC"
