id: genie__dev_mimo__net_flow_by_region_last_quarter__3
question: Net flow by Region, last quarter
source: genie_benchmark:01f15e792ce1140bbf6af2f8f7c6b54c
asof: '2026-06-08'
ground_truth_sql: "WITH mimo AS (\n    SELECT MIMOAction, AmountUSD, Region, TransactionDate,\
  \ IsInternalTransfer\n    FROM main.etoro_kpi.mimo_tp_deposits_v\n    UNION ALL\n\
  \    SELECT MIMOAction, AmountUSD, Region, TransactionDate, IsInternalTransfer\n\
  \    FROM main.etoro_kpi.mimo_tp_withdraws_v\n    UNION ALL\n    SELECT MIMOAction,\
  \ AmountUSD, Region, TransactionDate, IsInternalTransfer\n    FROM main.etoro_kpi.mimo_emoney_transactions_v\n\
  )\nSELECT\n    Region,\n    SUM(CASE WHEN MIMOAction = 'Deposit' THEN AmountUSD\
  \ ELSE -AmountUSD END) AS net_flow_usd\nFROM mimo\nWHERE TransactionDate >= ADD_MONTHS(DATE_TRUNC('QUARTER',\
  \ CURRENT_DATE()), -3)\n  AND TransactionDate <  DATE_TRUNC('QUARTER', CURRENT_DATE())\n\
  \  AND COALESCE(IsInternalTransfer, 0) = 0\nGROUP BY Region\nORDER BY net_flow_usd\
  \ DESC NULLS LAST;"
