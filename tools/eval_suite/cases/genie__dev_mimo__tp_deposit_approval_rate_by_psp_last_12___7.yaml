id: genie__dev_mimo__tp_deposit_approval_rate_by_psp_last_12___7
question: TP-deposit approval rate by PSP, last 12 months
source: genie_benchmark:01f15e792ce1140bbf6af2f8f7c6b54c
asof: '2026-06-08'
ground_truth_sql: "SELECT\n    Provider                                          \
  \                                    AS psp,\n    COUNT(*)                     \
  \                                                         AS attempts,\n    SUM(CASE\
  \ WHEN PaymentStatus IN ('Approved','Confirmed','Settled') THEN 1.0 END)\n     \
  \ / NULLIF(COUNT(*), 0)                                                        \
  \       AS approval_rate\nFROM main.etoro_kpi.mimo_tp_deposits_v\nWHERE TransactionDate\
  \ >= ADD_MONTHS(CURRENT_DATE(), -12)\nGROUP BY Provider\nORDER BY attempts DESC;"
