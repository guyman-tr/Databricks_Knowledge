# Seed parameters for the D (Compliance & AML) domain build.
# Consumed by:
#   tools/skills/enumerate_production_anchors.py --domain compliance
#   tools/skills/summarize_subgraph.py --domain compliance
#   tools/skills/find_embedded_domain_members.py --domain compliance
#   tools/skills/extract_confluence_edges.py --domain compliance   (Phase A.5)
#   tools/skills/cross_check_staleness.py --domain compliance      (Phase A.5b)
#
# v1 scope: AML risk classification + scoring only.
# Out of scope: KYC screening flow, tax compliance, regulatory reporting,
# Tribe audit interpretation. (Spec 011-build-domain-compliance-aml § Scope.)

id: compliance
display_name: "Compliance & AML"
skill_folder: domain-compliance-and-aml
parent_spec: 011-build-domain-compliance-aml

# Tier 1 — production etoro_kpi / etoro_kpi_prep views (matched against
# _kpi_views_index.json by self_ref equality).
kpi_seeds:
  - etoro_kpi.kyc_for_compliance_v
  - etoro_kpi.positions_for_compliance_v
  - etoro_kpi.ftd_funnel_kyc

# Tier 2 — Genie space TITLES (substring match against
# _genie_spaces_index.json[].title, case-insensitive). DEV/Test spaces
# included for completeness but flagged in the anchor report.
genie_seeds:
  - "AML Insights Genie"
  - "PROD - Compliance Genie"
  - "Customer AML Compliance Data"
  - "Customer Compliance and Profile"
  # DEV/Test variants — included for visibility, flagged non-production:
  - "Test - AML CMP"
  - "Compliance Genie - DEV"

# Canonical names (Schema.Object form from _join_graph.json) of manually
# selected anchor hubs. Used as additional graph seed nodes.
hub_tables:
  # production AML risk-classification tables surfaced by AML Insights Genie
  # (canonical names after the merge_graph.py UC → Synapse rewrite)
  - bi_compliance_stg.bi_compliance_cmp_tables_cmp_aml_risk_classification_cid_level
  - bi_compliance_stg.bi_compliance_cmp_tables_cmp_aml_risk_classification_cid_window_level
  - bi_compliance_stg.bi_compliance_cmp_tables_cmp_aml_risk_classification_aggregated_level
  - bi_compliance_stg.bi_compliance_cmp_tables_cmp_aml_risk_classification_aggregated_group_level
  # eToro production compliance schema (Synapse upstream)
  - Compliance.CustomerOnboardingRiskClassification
  - Compliance.CySecRiskClassificationParameter
  - RiskClassification.CustomerOnboardingRiskClassification
  - RiskClassification.CySecRiskClassificationParameter
  - Dictionary.CySecRiskClassificationParameter
  # Surfaced by Phase A.4 Tableau fly-over - AML routing table cited by the
  # FCMU "AML Clients" workbook with `WHERE CategoryName = 'AML'`.
  - BI_DB_dbo.BI_DB_RiskAlertManagementTool

# Regex patterns for find_embedded_domain_members.py — names that "feel like"
# this domain but Louvain may have placed in another cluster (B's
# Customer/snapshot family at clusters 1/2/3/10, per _CHECKPOINT_A.md).
embedded_scan_patterns:
  # NOTE: don't use \b around aml/pep because '_' is a word char in regex,
  # so \baml\b would FAIL to match BI_DB_AML_* (the prevailing AML table naming).
  - "(?i)aml"
  - "(?i)risk_class"
  - "(?i)riskclassification"
  - "(?i)watchlist"
  - "(?i)sanctions"
  - "(?i)_pep_"        # PEP politically-exposed-person; conservative pattern
  - "(?i)cmp_aml"

# Confluence corpus seeds — query terms run against
# plugin-atlassian-atlassian MCP search by extract_confluence_edges.py.
# Page selection is stability-weighted (see FR-007 in spec 011).
confluence_query_terms:
  - "AML risk classification"
  - "Anti-Money Laundering Handbook"
  - "AML Framework"
  - "Compliance Risk Classification"
  - "Customer Risk Classification"
  - "AML Scoring Methodology"
  - "CySec Risk Classification"
  - "PEP screening"
  - "Sanctions list management"
  - "Watchlist match"
  - "AML alert investigation"

# Louvain cluster IDs from spec 007 clustering that contain this domain's
# core (per knowledge/skills/_CHECKPOINT_A.md, table row D):
#   "Anchor hubs: BI_DB_Tax_Compliance_TIN, bi_compliance_cmp_aml_risk_classification_*,
#    BI_DB_QMMF_Report, BI_DB_AML_*  |  Cluster IDs: 21, 24, 35 (+ many
#    tables nested in B1)  |  ~30 standalone"
# Cluster 35 alone is only 2 nodes (Dim_VerificationStatus + Dictionary.VerificationStatus).
# The real D core is the UNION of 21, 24, 35 plus the AML-tagged members
# embedded in clusters 1/2/3/10 (surfaced by find_embedded_domain_members.py).
primary_clusters:
  - 21    # Tax Compliance (7 nodes, OUT OF v1 scope but topologically D)
  - 24    # KYC question panel (2 nodes, OUT OF v1 scope but topologically D)
  - 35    # VerificationStatus dim (2 nodes, adjacent infra)
  - 53    # cmp_aml_risk_classification_* family (4 nodes, IN v1 SCOPE - the
          #       production AML scoring core). Discovered by Phase A.3
          #       summarize_subgraph.py via hub_tables match; CHECKPOINT_A
          #       did not list this cluster among D's anchors.

# Sibling clusters where embedded AML/compliance members may live
# (per _CHECKPOINT_A.md: AML largely embedded in Customer/snapshot family).
embedded_clusters:
  - 1
  - 2
  - 3
  - 10

# Sibling super-domains that may share bridge tables — used to label
# cross-edges in _compliance_subgraph.md.
sibling_domains:
  - customer-and-identity
  - payments
  - cross
